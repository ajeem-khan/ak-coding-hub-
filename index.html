<!DOCTYPE html>
<html>
<head>
    <title>Azeem Code Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Azeem Code Hub 🚀</h1>

<input type="text" id="search" placeholder="Search code..." onkeyup="searchCode()">

<div class="filters">
    <button onclick="filterCode('all')">All</button>
    <button onclick="filterCode('python')">Python</button>
    <button onclick="filterCode('html')">HTML</button>
    <button onclick="filterCode('js')">JavaScript</button>
</div>

<div class="container">

    <div class="code-card python">
        <h2>Python Code 🐍</h2>
        <button onclick="copyCode('code1')">Copy</button>
        <pre id="code1">
print("Hello World")
        </pre>
    </div>

    <div class="code-card html">
        <h2>HTML Code 🌐</h2>
        <button onclick="copyCode('code2')">Copy</button>
        <pre id="code2">
<h1>Hello Azeem</h1>
        </pre>
    </div>

    <div class="code-card js">
        <h2>JavaScript Code ⚡</h2>
        <button onclick="copyCode('code3')">Copy</button>
        <pre id="code3">
alert("Hello Azeem")
        </pre>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
